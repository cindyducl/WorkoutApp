<title>Setlist — daily sets</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');
:root{
  --bg:#F4F6F5;--surface:#FFFFFF;--ink:#16211C;--muted:#7C8983;--line:#E4E8E6;
  --accent:#17B26A;--accent-deep:#0E8A50;--accent-wash:#E9F9F0;--danger:#E5484D;
  --pip-empty:#EDF0EE;--radius:18px;--shadow:0 1px 2px rgba(22,33,28,.04), 0 8px 24px rgba(22,33,28,.05);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.4;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
button:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:8px;}
.wrap{max-width:560px;margin:0 auto;padding:22px 18px 120px;}
.brand{display:flex;align-items:baseline;gap:8px;margin-bottom:2px;}
.brand h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;letter-spacing:.14em;text-transform:uppercase;margin:0;}
.brand .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);align-self:center;}
.subhead{color:var(--muted);font-size:13.5px;font-weight:500;}
.tabs{display:flex;background:#EAEEEC;border-radius:13px;padding:4px;gap:4px;margin:18px 0 20px;}
.tab{flex:1;text-align:center;padding:9px 0;border-radius:10px;font-weight:600;font-size:14px;color:var(--muted);transition:background .18s ease,color .18s ease;}
.tab.active{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(22,33,28,.08);}
.summary{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;margin:0 0 24px;box-shadow:var(--shadow);}
.summary-top{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;}
.count{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:34px;line-height:1;letter-spacing:-.01em;}
.count .of{color:var(--muted);font-size:19px;font-weight:600;}
.count-label{color:var(--muted);font-size:12.5px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;margin-top:6px;}
.pct{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;color:var(--accent-deep);}
.track{height:8px;border-radius:99px;background:var(--pip-empty);margin-top:16px;overflow:hidden;}
.track-fill{height:100%;width:0;background:var(--accent);border-radius:99px;transition:width .45s cubic-bezier(.22,1,.36,1);}
.done-banner{display:none;align-items:center;gap:10px;margin-top:14px;padding:11px 14px;background:var(--accent-wash);border-radius:12px;color:var(--accent-deep);font-weight:600;font-size:14px;}
.done-banner.show{display:flex;}

/* sections */
.section{margin-bottom:22px;}
.sec-head{display:flex;align-items:center;gap:10px;padding:0 2px 10px;cursor:pointer;}
.sec-caret{width:16px;height:16px;color:var(--muted);flex:0 0 auto;transition:transform .2s ease;}
.sec-caret svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.4;fill:none;}
.section.collapsed .sec-caret{transform:rotate(-90deg);}
.sec-title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15.5px;flex:1;}
.sec-prog{font-family:'Space Grotesk',sans-serif;font-size:12.5px;font-weight:600;color:var(--muted);}
.sec-prog.done{color:var(--accent-deep);}
.sec-edit{color:var(--muted);font-size:12px;font-weight:600;padding:5px 7px;border-radius:8px;flex:0 0 auto;}
.sec-edit:hover{background:var(--pip-empty);color:var(--ink);}
.sec-bar{height:5px;border-radius:99px;background:var(--pip-empty);overflow:hidden;margin:0 2px 12px;}
.sec-bar span{display:block;height:100%;background:var(--accent);border-radius:99px;transition:width .4s ease;}
.sec-body{display:flex;flex-direction:column;gap:12px;}
.section.collapsed .sec-body,.section.collapsed .sec-bar{display:none;}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);transition:background .3s ease,border-color .3s ease;}
.card.complete{background:var(--accent-wash);border-color:#BFEBD3;}
.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.ex-name{font-weight:600;font-size:16.5px;display:flex;align-items:center;gap:8px;}
.ex-detail{color:var(--muted);font-size:13px;margin-top:2px;font-weight:500;}
.tick{width:18px;height:18px;border-radius:50%;background:var(--accent);display:none;align-items:center;justify-content:center;flex:0 0 auto;}
.card.complete .tick{display:inline-flex;}
.tick svg{width:11px;height:11px;stroke:#fff;stroke-width:2.5;fill:none;}
.setcount{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;color:var(--muted);white-space:nowrap;padding-top:2px;}
.setcount b{color:var(--ink);font-size:15px;}
.card.complete .setcount b{color:var(--accent-deep);}
.pips{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap;}
.pip{flex:1 1 0;min-width:22px;height:34px;border-radius:9px;background:var(--pip-empty);position:relative;transition:background .2s ease,transform .12s ease;}
.pip.filled{background:var(--accent);}
.pip:active{transform:scale(.94);}
.pip::after{content:"";position:absolute;inset:0;border-radius:9px;box-shadow:inset 0 0 0 1.5px rgba(22,33,28,.05);}
.pip.filled::after{box-shadow:none;}
@keyframes pop{0%{transform:scale(.8)}60%{transform:scale(1.06)}100%{transform:scale(1)}}
.pip.just-filled{animation:pop .28s cubic-bezier(.22,1,.36,1);}
.card-actions{display:flex;gap:14px;margin-top:14px;}
.link-btn{color:var(--muted);font-size:13px;font-weight:600;padding:2px 0;}
.link-btn:hover{color:var(--ink);}
.link-btn.danger:hover{color:var(--danger);}

.form{margin-top:2px;display:flex;flex-direction:column;gap:10px;}
.field label{display:block;font-size:11.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.field input,.field select{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:11px;font-family:inherit;font-size:15px;color:var(--ink);background:#fff;-webkit-appearance:none;appearance:none;}
.field select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%237C8983' stroke-width='2.4'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:right 13px center;padding-right:38px;}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(23,178,106,.12);}
.field-row{display:flex;gap:10px;}
.field-row .field{flex:1;}
.field-row .field.sets{flex:0 0 96px;}
.form-actions{display:flex;gap:10px;margin-top:2px;align-items:center;}
.btn{padding:11px 18px;border-radius:11px;font-weight:600;font-size:14.5px;transition:filter .15s ease,opacity .15s ease;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{filter:brightness(1.05);}
.btn-ghost{background:transparent;color:var(--muted);}
.btn-ghost:hover{color:var(--ink);}

.add-ex{width:100%;margin-top:2px;padding:12px;border-radius:12px;border:1.5px dashed #CBD3CF;background:transparent;color:var(--muted);font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:center;gap:6px;transition:border-color .2s ease,color .2s ease,background .2s ease;}
.add-ex:hover{border-color:var(--accent);color:var(--accent-deep);background:var(--accent-wash);}
.add-ex svg{width:15px;height:15px;stroke:currentColor;stroke-width:2.2;fill:none;}
.new-sec{width:100%;margin-top:4px;padding:15px;border-radius:var(--radius);border:1.5px solid var(--line);background:var(--surface);color:var(--ink);font-weight:600;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:var(--shadow);}
.new-sec:hover{border-color:var(--accent);color:var(--accent-deep);}
.new-sec svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.2;fill:none;}

.footer{margin-top:26px;display:flex;justify-content:center;}
.reset-btn{color:var(--muted);font-size:13px;font-weight:600;}
.reset-btn:hover{color:var(--danger);}
.empty{text-align:center;color:var(--muted);padding:34px 20px;font-size:14.5px;}

.stats{display:flex;gap:10px;margin:0 0 18px;}
.stat{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 14px 13px;box-shadow:var(--shadow);}
.stat .v{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;line-height:1;}
.stat .l{color:var(--muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-top:6px;}
.cal{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 16px 18px;box-shadow:var(--shadow);}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-nav .m{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;}
.cal-nav button{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--muted);}
.cal-nav button:hover{background:var(--pip-empty);color:var(--ink);}
.cal-nav button:disabled{opacity:.3;cursor:default;}
.cal-nav svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.2;fill:none;}
.dow{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px;}
.dow span{text-align:center;font-size:11px;font-weight:600;color:var(--muted);}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cell{aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--ink);background:var(--pip-empty);transition:transform .1s ease;}
.cell.blank{background:transparent;pointer-events:none;}
.cell.today{box-shadow:inset 0 0 0 2px var(--accent);}
.cell.sel{box-shadow:inset 0 0 0 2px var(--ink);}
.cell:active{transform:scale(.93);}
.legend{display:flex;align-items:center;gap:6px;justify-content:flex-end;margin-top:12px;font-size:11px;color:var(--muted);font-weight:500;}
.legend i{width:13px;height:13px;border-radius:4px;display:inline-block;}
.day-detail{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);margin-top:14px;}
.day-detail h3{font-family:'Space Grotesk',sans-serif;font-size:15px;margin:0 0 2px;}
.day-detail .dd-sum{color:var(--muted);font-size:13px;font-weight:600;margin-bottom:12px;}
.dd-sec{font-family:'Space Grotesk',sans-serif;font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:14px 0 2px;}
.dd-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-top:1px solid var(--line);}
.dd-row .n{font-size:14.5px;font-weight:500;flex:1;}
.dd-bar{width:74px;height:6px;border-radius:99px;background:var(--pip-empty);overflow:hidden;flex:0 0 auto;}
.dd-bar span{display:block;height:100%;background:var(--accent);border-radius:99px;}
.dd-row .c{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--muted);flex:0 0 auto;min-width:42px;text-align:right;}
.dd-empty{color:var(--muted);font-size:14px;padding:6px 0 2px;}
.hist-actions{margin-top:16px;display:flex;justify-content:center;flex-wrap:wrap;gap:10px;}
.exp-btn{padding:11px 18px;border-radius:11px;font-weight:600;font-size:14px;border:1px solid var(--line);background:var(--surface);color:var(--ink);box-shadow:var(--shadow);display:inline-flex;align-items:center;gap:8px;}
.exp-btn:hover{border-color:var(--accent);color:var(--accent-deep);}
.exp-btn svg{width:15px;height:15px;stroke:currentColor;stroke-width:2.2;fill:none;}
.hidden{display:none!important;}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><span class="dot"></span><h1>Setlist</h1></div>
    <div class="subhead" id="dateLine"></div>
  </header>

  <div class="tabs">
    <button class="tab active" id="tabToday">Today</button>
    <button class="tab" id="tabHistory">History</button>
  </div>

  <div id="todayView">
    <section class="summary">
      <div class="summary-top">
        <div>
          <div class="count"><span id="doneCount">0</span><span class="of">/<span id="totalCount">0</span></span></div>
          <div class="count-label">sets logged today</div>
        </div>
        <div class="pct" id="pctText">0%</div>
      </div>
      <div class="track"><div class="track-fill" id="trackFill"></div></div>
      <div class="done-banner" id="doneBanner"><span>✓</span><span>Session complete — nice work.</span></div>
    </section>
    <div id="list"></div>
    <div class="footer"><button class="reset-btn" id="resetBtn">Reset today's progress</button></div>
  </div>

  <div id="historyView" class="hidden">
    <div class="stats">
      <div class="stat"><div class="v" id="stStreak">0</div><div class="l">Day streak</div></div>
      <div class="stat"><div class="v" id="stDays">0</div><div class="l">Days trained</div></div>
      <div class="stat"><div class="v" id="stMonth">0</div><div class="l" id="stMonthLbl">Sets this month</div></div>
    </div>
    <div class="cal">
      <div class="cal-nav">
        <button id="prevM" aria-label="Previous month"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
        <div class="m" id="calMonthLbl">—</div>
        <button id="nextM" aria-label="Next month"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
      <div class="dow"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div>
      <div class="grid" id="calGrid"></div>
      <div class="legend">Less<i style="background:var(--pip-empty)"></i><i style="background:rgba(23,178,106,.35)"></i><i style="background:rgba(23,178,106,.65)"></i><i style="background:var(--accent)"></i>More</div>
    </div>
    <div class="day-detail" id="dayDetail"></div>
    <div class="hist-actions"><button class="exp-btn" id="exportCsv"><svg viewBox="0 0 24 24"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg> Export CSV</button><button class="exp-btn" id="backupBtn"><svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Back up</button><button class="exp-btn" id="restoreBtn"><svg viewBox="0 0 24 24"><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/><path d="M20 16v3a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-3"/></svg> Restore</button><input type="file" id="restoreFile" accept="application/json,.json" class="hidden"></div>
  </div>
</div>

<script>
/* ---------- storage: browser localStorage ---------- */
function sget(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function sset(k,v){ try{ localStorage.setItem(k,v); }catch(e){ console.error('save failed',e); } }
function slist(prefix){ const out=[]; try{ for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.indexOf(prefix)===0) out.push(k); } }catch(e){} return out; }
function getJSON(k){ const v=sget(k); if(!v) return null; try{ return JSON.parse(v); }catch(e){ return null; } }

function keyOf(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function todayKey(){ return keyOf(new Date()); }
function prettyToday(){ return new Date().toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'}); }
function prettyFromKey(k){ const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d).toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'}); }
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

const EX_KEY='wt_exercises';
const SECTIONS_KEY='wt_sections';
const COLLAPSE_KEY='wt_collapsed';
const DATE=todayKey();
const PROG_PREFIX='wt_progress_';
const META_PREFIX='wt_daymeta_';
const PROG_KEY=PROG_PREFIX+DATE;

let sections=[];      // [{id,name}]
let exercises=[];     // [{id,name,detail,sets,sectionId}]
let progress={};
let collapsed={};     // {sectionId:true}
let view='today';

/* form/editing state */
let editingId=null;       // exercise id being edited, or 'new'
let addTargetSection=null;// section id when editingId==='new'
let editingSection=null;  // section id being edited
let addingSection=false;

const now=new Date();
let calYear=now.getFullYear();
let calMonth=now.getMonth();
let selectedDate=DATE;
const countsCache={}, metaCache={};

const DEFAULT_PROGRAM=[
  {section:'ACL REHAB', items:[
    ['Heel Pump','20 reps',3],
    ['Kneeling','1 min',3],
    ['Calf raise','20 reps',3],
    ['Dead Bug','15 reps',3],
    ['Weight Bearing','1 min',5],
    ['Step Up','8 reps',3],
    ['Hinge Step Up','8 reps',3],
    ['Flexion','8 reps',3],
  ]},
  {section:'BEAUTY', items:[
    ['\u62ac\u5934\u4f38\u820c\u5934','50 reps',1],
    ['\u820c\u5934\u5634\u5185\u6253\u8f6c','50 reps',1],
    ['\u5480\u5634','50 reps',1],
    ['\u63c9\u8138','50 reps',1],
    ['\u6309\u773c\u4e0b\u653e\u677e\u808c\u8089','50 seconds',1],
    ['\u4f4e\u4fa7\u5934\u7f15\u8116\u5b50\u7ecf','10 seconds',1],
    ['\u641e\u8033\u6735','30 reps',1],
  ]},
  {section:'GENERAL', items:[
    ['Push Up','10 reps',5],
    ['\u62db\u8d22\u732b','25 reps',2],
    ['\u4fa7\u5e73\u4e3e','25 reps',2],
    ['Weights','10 reps',3],
    ['Crunches','25 reps',4],
    ['Pull Down','25 reps',4],
    ['Triceps','10 reps',4],
    ['Scissor Kick','25 reps',4],
  ]},
];
function seedDefaults(){
  sections=[]; exercises=[];
  DEFAULT_PROGRAM.forEach(g=>{
    const sid=uid('s'); sections.push({id:sid,name:g.section});
    g.items.forEach(it=>{ exercises.push({id:uid(),name:it[0],detail:it[1],sets:it[2],sectionId:sid}); });
  });
}
function uid(p){ return (p||'x')+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function load(){
  const DEFVER=2;
  sections=getJSON(SECTIONS_KEY)||[];
  exercises=getJSON(EX_KEY);
  const storedVer=parseInt(sget('wt_defaults_v')||'0',10);
  if(!exercises){
    seedDefaults();               // fresh install: load default program
  } else if(storedVer<DEFVER){
    // upgrade the old placeholder sample to the new program, but only if untouched
    const oldSample = exercises.length===3 && ['Push-ups','Goblet squats','Plank'].every(n=>exercises.some(e=>e&&e.name===n));
    if(oldSample) seedDefaults();
  }
  sset('wt_defaults_v',String(DEFVER));
  if(sections.length===0){ const gid=uid('s'); sections=[{id:gid,name:'General'}]; }
  const ids={}; sections.forEach(s=>ids[s.id]=true);
  exercises.forEach(e=>{ if(!e.sectionId || !ids[e.sectionId]) e.sectionId=sections[0].id; });
  const col=getJSON(COLLAPSE_KEY)||[];
  collapsed={}; col.forEach(id=>collapsed[id]=true);
  const p=getJSON(PROG_KEY); if(p) progress=p;
  saveSections(); saveExercises();
}
function saveExercises(){ sset(EX_KEY,JSON.stringify(exercises)); updateDayMeta(); }
function saveSections(){ sset(SECTIONS_KEY,JSON.stringify(sections)); updateDayMeta(); }
function saveProgress(){ sset(PROG_KEY,JSON.stringify(progress)); countsCache[DATE]=progress; updateDayMeta(); }
function saveCollapsed(){ sset(COLLAPSE_KEY,JSON.stringify(Object.keys(collapsed).filter(k=>collapsed[k]))); }
function sectionName(id){ const s=sections.find(x=>x.id===id); return s?s.name:'General'; }

function updateDayMeta(){
  const ex={}; let tot=0;
  exercises.forEach(e=>{ ex[e.id]={n:e.name,s:e.sets,sec:sectionName(e.sectionId)}; tot+=e.sets; });
  const meta={tot,ex,secs:sections.map(s=>s.name)};
  metaCache[DATE]=meta; sset(META_PREFIX+DATE,JSON.stringify(meta));
}

/* ---------- TODAY ---------- */
const list=document.getElementById('list');

function renderToday(){
  document.getElementById('dateLine').textContent=prettyToday();
  list.innerHTML='';

  sections.forEach(sec=>{
    const wrapper=document.createElement('div');
    wrapper.className='section'+(collapsed[sec.id]?' collapsed':'');

    if(editingSection===sec.id){ wrapper.appendChild(sectionForm(sec)); }
    else{
      const secEx=exercises.filter(e=>e.sectionId===sec.id);
      let tot=0,done=0; secEx.forEach(e=>{ tot+=e.sets; done+=Math.min(progress[e.id]||0,e.sets); });
      const complete=tot>0&&done>=tot;

      const head=document.createElement('div'); head.className='sec-head';
      head.innerHTML='<span class="sec-caret"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></span>'+
        '<span class="sec-title">'+escapeHtml(sec.name)+'</span>'+
        '<span class="sec-prog'+(complete?' done':'')+'">'+done+'/'+tot+'</span>';
      const editBtn=document.createElement('button'); editBtn.className='sec-edit'; editBtn.textContent='Edit';
      editBtn.onclick=(ev)=>{ ev.stopPropagation(); editingSection=sec.id; renderToday(); };
      head.appendChild(editBtn);
      head.onclick=()=>{ collapsed[sec.id]=!collapsed[sec.id]; saveCollapsed(); renderToday(); };
      wrapper.appendChild(head);

      const bar=document.createElement('div'); bar.className='sec-bar';
      const bspan=document.createElement('span'); bspan.style.width=(tot?Math.round(done/tot*100):0)+'%';
      bar.appendChild(bspan); wrapper.appendChild(bar);

      const body=document.createElement('div'); body.className='sec-body';
      secEx.forEach(ex=>{
        if(editingId===ex.id) body.appendChild(editForm(ex));
        else body.appendChild(exerciseCard(ex));
      });
      if(editingId==='new' && addTargetSection===sec.id){ body.appendChild(editForm(null,sec.id)); }
      else{
        const add=document.createElement('button'); add.className='add-ex';
        add.innerHTML='<svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> Add exercise';
        add.onclick=()=>{ editingId='new'; addTargetSection=sec.id; if(collapsed[sec.id]){collapsed[sec.id]=false;saveCollapsed();} renderToday(); };
        body.appendChild(add);
      }
      wrapper.appendChild(body);
    }
    list.appendChild(wrapper);
  });

  // new section area
  if(addingSection){ list.appendChild(newSectionForm()); }
  else{
    const ns=document.createElement('button'); ns.className='new-sec';
    ns.innerHTML='<svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> New section';
    ns.onclick=()=>{ addingSection=true; renderToday(); };
    list.appendChild(ns);
  }
  updateSummary();
}

function exerciseCard(ex){
  const done=Math.min(progress[ex.id]||0, ex.sets);
  const complete=done>=ex.sets && ex.sets>0;
  const card=document.createElement('div'); card.className='card'+(complete?' complete':'');
  const head=document.createElement('div'); head.className='card-head';
  head.innerHTML='<div><div class="ex-name">'+escapeHtml(ex.name)+
    '<span class="tick"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></span></div>'+
    (ex.detail?'<div class="ex-detail">'+escapeHtml(ex.detail)+'</div>':'')+
    '</div><div class="setcount"><b>'+done+'</b> / '+ex.sets+'</div>';
  card.appendChild(head);
  const pips=document.createElement('div'); pips.className='pips';
  for(let i=0;i<ex.sets;i++){
    const pip=document.createElement('button');
    pip.className='pip'+(i<done?' filled':'');
    pip.setAttribute('aria-label','Set '+(i+1)+(i<done?' done, tap to undo':', tap to log'));
    pip.onclick=()=>togglePip(ex,i);
    pips.appendChild(pip);
  }
  card.appendChild(pips);
  const actions=document.createElement('div'); actions.className='card-actions';
  const edit=document.createElement('button'); edit.className='link-btn'; edit.textContent='Edit';
  edit.onclick=()=>{editingId=ex.id;renderToday();};
  actions.appendChild(edit); card.appendChild(actions);
  return card;
}

function sectionOptions(selectedId){
  let opts='';
  sections.forEach(s=>{ opts+='<option value="'+s.id+'"'+(s.id===selectedId?' selected':'')+'>'+escapeHtml(s.name)+'</option>'; });
  opts+='<option value="__new__">+ New section…</option>';
  return opts;
}

function editForm(ex,presetSection){
  const isNew=!ex;
  const curSection=ex?ex.sectionId:(presetSection||sections[0].id);
  const wrap=document.createElement('div'); wrap.className='card';
  wrap.innerHTML='<div class="form">'+
    '<div class="field"><label>Exercise</label>'+
      '<input id="f-name" type="text" placeholder="e.g. Bench press" value="'+(ex?escapeAttr(ex.name):'')+'"></div>'+
    '<div class="field-row">'+
      '<div class="field"><label>Detail (optional)</label>'+
        '<input id="f-detail" type="text" placeholder="reps, weight, time" value="'+(ex?escapeAttr(ex.detail||''):'')+'"></div>'+
      '<div class="field sets"><label>Sets</label>'+
        '<input id="f-sets" type="number" min="1" max="20" inputmode="numeric" value="'+(ex?ex.sets:3)+'"></div>'+
    '</div>'+
    '<div class="field"><label>Section</label><select id="f-section">'+sectionOptions(curSection)+'</select></div>'+
    '<div class="field hidden" id="f-newsec-wrap"><label>New section name</label><input id="f-newsec" type="text" placeholder="e.g. ACL rehab"></div>'+
    '<div class="form-actions">'+
      '<button class="btn btn-primary" id="f-save">'+(isNew?'Add exercise':'Save')+'</button>'+
      '<button class="btn btn-ghost" id="f-cancel">Cancel</button>'+
      (isNew?'':'<button class="link-btn danger" id="f-delete" style="margin-left:auto">Delete</button>')+
    '</div></div>';
  setTimeout(()=>{
    const nameEl=wrap.querySelector('#f-name'); if(nameEl) nameEl.focus();
    const sel=wrap.querySelector('#f-section'); const nsWrap=wrap.querySelector('#f-newsec-wrap');
    sel.onchange=()=>{ nsWrap.classList.toggle('hidden', sel.value!=='__new__'); if(sel.value==='__new__'){ const n=wrap.querySelector('#f-newsec'); if(n) n.focus(); } };
    wrap.querySelector('#f-save').onclick=()=>commitForm(ex,wrap);
    wrap.querySelector('#f-cancel').onclick=()=>{editingId=null;addTargetSection=null;renderToday();};
    const del=wrap.querySelector('#f-delete'); if(del) del.onclick=()=>deleteExercise(ex.id);
  },0);
  return wrap;
}

function commitForm(ex,wrap){
  const name=wrap.querySelector('#f-name').value.trim();
  const detail=wrap.querySelector('#f-detail').value.trim();
  let sets=parseInt(wrap.querySelector('#f-sets').value,10);
  let sectionId=wrap.querySelector('#f-section').value;
  if(!name){ wrap.querySelector('#f-name').focus(); return; }
  if(!sets||sets<1) sets=1; if(sets>20) sets=20;
  if(sectionId==='__new__'){
    const nm=wrap.querySelector('#f-newsec').value.trim();
    if(!nm){ wrap.querySelector('#f-newsec').focus(); return; }
    const s={id:uid('s'),name:nm}; sections.push(s); sectionId=s.id; saveSections();
  }
  if(ex){
    ex.name=name; ex.detail=detail; ex.sets=sets; ex.sectionId=sectionId;
    if((progress[ex.id]||0)>sets){ progress[ex.id]=sets; saveProgress(); }
  }else{ exercises.push({id:uid(),name,detail,sets,sectionId}); }
  editingId=null; addTargetSection=null; saveExercises(); renderToday();
}
function deleteExercise(id){
  exercises=exercises.filter(e=>e.id!==id); delete progress[id]; editingId=null; addTargetSection=null;
  saveExercises(); saveProgress(); renderToday();
}

/* section add/edit */
function newSectionForm(){
  const wrap=document.createElement('div'); wrap.className='card';
  wrap.innerHTML='<div class="form">'+
    '<div class="field"><label>Section name</label><input id="s-name" type="text" placeholder="e.g. ACL rehab, Beauty, General"></div>'+
    '<div class="form-actions"><button class="btn btn-primary" id="s-save">Add section</button>'+
    '<button class="btn btn-ghost" id="s-cancel">Cancel</button></div></div>';
  setTimeout(()=>{
    const n=wrap.querySelector('#s-name'); if(n) n.focus();
    wrap.querySelector('#s-save').onclick=()=>{
      const nm=wrap.querySelector('#s-name').value.trim(); if(!nm){ n.focus(); return; }
      sections.push({id:uid('s'),name:nm}); addingSection=false; saveSections(); renderToday();
    };
    wrap.querySelector('#s-cancel').onclick=()=>{ addingSection=false; renderToday(); };
  },0);
  return wrap;
}
function sectionForm(sec){
  const wrap=document.createElement('div'); wrap.className='card';
  const onlyOne=sections.length<=1;
  wrap.innerHTML='<div class="form">'+
    '<div class="field"><label>Section name</label><input id="s-name" type="text" value="'+escapeAttr(sec.name)+'"></div>'+
    '<div class="form-actions"><button class="btn btn-primary" id="s-save">Save</button>'+
    '<button class="btn btn-ghost" id="s-cancel">Cancel</button>'+
    (onlyOne?'':'<button class="link-btn danger" id="s-delete" style="margin-left:auto">Delete section</button>')+
    '</div>'+
    (onlyOne?'':'<div class="ex-detail" style="margin-top:-2px">Deleting moves its exercises to “'+escapeHtml(sections.find(s=>s.id!==sec.id).name)+'”.</div>')+
    '</div>';
  setTimeout(()=>{
    const n=wrap.querySelector('#s-name'); if(n) n.focus();
    wrap.querySelector('#s-save').onclick=()=>{
      const nm=wrap.querySelector('#s-name').value.trim(); if(!nm){ n.focus(); return; }
      sec.name=nm; editingSection=null; saveSections(); renderToday();
    };
    wrap.querySelector('#s-cancel').onclick=()=>{ editingSection=null; renderToday(); };
    const del=wrap.querySelector('#s-delete');
    if(del) del.onclick=()=>{
      const target=sections.find(s=>s.id!==sec.id);
      exercises.forEach(e=>{ if(e.sectionId===sec.id) e.sectionId=target.id; });
      sections=sections.filter(s=>s.id!==sec.id);
      editingSection=null; saveSections(); saveExercises(); renderToday();
    };
  },0);
  return wrap;
}

function togglePip(ex,i){
  const cur=progress[ex.id]||0;
  const next=(i+1===cur)? i : i+1;
  progress[ex.id]=next; saveProgress(); renderToday();
}

function updateSummary(){
  let total=0, done=0;
  exercises.forEach(ex=>{ total+=ex.sets; done+=Math.min(progress[ex.id]||0,ex.sets); });
  document.getElementById('doneCount').textContent=done;
  document.getElementById('totalCount').textContent=total;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('pctText').textContent=pct+'%';
  document.getElementById('trackFill').style.width=pct+'%';
  document.getElementById('doneBanner').classList.toggle('show', total>0 && done>=total);
}
function resetDay(){ progress={}; saveProgress(); renderToday(); }

/* ---------- HISTORY ---------- */
function sumCounts(c){ if(!c) return 0; let s=0; for(const k in c) s+=c[k]||0; return s; }
function dayDone(counts, meta){
  if(!counts) return 0; let done=0;
  for(const id in counts){ const cap=(meta&&meta.ex&&meta.ex[id])? meta.ex[id].s : Infinity; done+=Math.min(counts[id]||0, cap); }
  return done;
}
function dayFraction(counts, meta){
  const done=dayDone(counts,meta); if(done<=0) return 0;
  if(meta&&meta.tot>0) return Math.max(0,Math.min(1,done/meta.tot));
  return 0.5;
}
function loadHistory(){
  const dates=slist(PROG_PREFIX).map(k=>k.slice(PROG_PREFIX.length));
  for(const d of dates){
    if(!(d in countsCache)) countsCache[d]=getJSON(PROG_PREFIX+d);
    if(!(d in metaCache))   metaCache[d]=getJSON(META_PREFIX+d);
  }
  return dates;
}
function computeStats(){
  const dates=Object.keys(countsCache);
  const active={}; dates.forEach(d=>{ if(sumCounts(countsCache[d])>0) active[d]=true; });
  const daysTrained=Object.keys(active).length;
  let streak=0, cursor=new Date();
  if(!active[keyOf(cursor)]) cursor.setDate(cursor.getDate()-1);
  while(active[keyOf(cursor)]){ streak++; cursor.setDate(cursor.getDate()-1); }
  let monthSets=0; const pfx=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-';
  dates.forEach(d=>{ if(d.indexOf(pfx)===0) monthSets+=sumCounts(countsCache[d]); });
  return {daysTrained,streak,monthSets};
}
function renderHistory(){
  loadHistory();
  const st=computeStats();
  document.getElementById('stStreak').textContent=st.streak;
  document.getElementById('stDays').textContent=st.daysTrained;
  document.getElementById('stMonth').textContent=st.monthSets;
  document.getElementById('stMonthLbl').textContent='Sets in '+MONTHS[calMonth].slice(0,3);
  document.getElementById('calMonthLbl').textContent=MONTHS[calMonth]+' '+calYear;
  document.getElementById('nextM').disabled=(calYear===now.getFullYear() && calMonth===now.getMonth());

  const grid=document.getElementById('calGrid'); grid.innerHTML='';
  const first=new Date(calYear,calMonth,1);
  const startPad=first.getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  for(let i=0;i<startPad;i++){ const b=document.createElement('div'); b.className='cell blank'; grid.appendChild(b); }
  for(let day=1;day<=daysInMonth;day++){
    const dk=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    const counts=countsCache[dk], meta=metaCache[dk];
    const cell=document.createElement('button'); cell.className='cell';
    if(dk===DATE) cell.classList.add('today');
    if(dk===selectedDate) cell.classList.add('sel');
    cell.textContent=day;
    if(sumCounts(counts)>0){
      const frac=dayFraction(counts,meta), alpha=0.28+0.72*frac;
      cell.style.background='rgba(23,178,106,'+alpha.toFixed(2)+')';
      if(alpha>0.6) cell.style.color='#fff';
    }
    cell.onclick=()=>{ selectedDate=dk; renderHistory(); };
    grid.appendChild(cell);
  }
  renderDayDetail();
}
function renderDayDetail(){
  const box=document.getElementById('dayDetail');
  const dk=selectedDate, counts=countsCache[dk], meta=metaCache[dk];
  const done=dayDone(counts,meta);
  let html='<h3>'+prettyFromKey(dk)+(dk===DATE?' · today':'')+'</h3>';
  if(!counts || sumCounts(counts)===0){ box.innerHTML=html+'<div class="dd-empty">No sets logged this day.</div>'; return; }
  if(meta && meta.tot>0){ html+='<div class="dd-sum">'+done+' / '+meta.tot+' sets · '+Math.round(done/meta.tot*100)+'%</div>'; }
  else{ html+='<div class="dd-sum">'+sumCounts(counts)+' sets logged</div>'; }

  const curNames={}; exercises.forEach(e=>curNames[e.id]=e.name);
  // group rows by section using that day's snapshot
  const groups={}; const order=[];
  function push(secName, row){ if(!(secName in groups)){ groups[secName]=[]; order.push(secName); } groups[secName].push(row); }
  const seen={};
  if(meta&&meta.ex){
    const secOrder=meta.secs||[];
    secOrder.forEach(s=>{ groups[s]=groups[s]||[]; if(order.indexOf(s)<0) order.push(s); });
    for(const id in meta.ex){
      const t=meta.ex[id].s, d=Math.min(counts[id]||0,t);
      push(meta.ex[id].sec||'General', {name:meta.ex[id].n, done:d, target:t}); seen[id]=true;
    }
  }
  for(const id in counts){ if(seen[id]) continue; push('General', {name:curNames[id]||'Exercise', done:counts[id], target:null}); }

  const multi=order.filter(s=>groups[s]&&groups[s].length).length>1;
  order.forEach(secName=>{
    const rows=groups[secName]; if(!rows||!rows.length) return;
    if(multi) html+='<div class="dd-sec">'+escapeHtml(secName)+'</div>';
    rows.forEach(r=>{
      const frac=r.target? Math.min(1,r.done/r.target):(r.done>0?1:0);
      const label=r.target? (r.done+' / '+r.target):(r.done+' sets');
      html+='<div class="dd-row"><span class="n">'+escapeHtml(r.name)+'</span>'+
            '<span class="dd-bar"><span style="width:'+Math.round(frac*100)+'%"></span></span>'+
            '<span class="c">'+label+'</span></div>';
    });
  });
  box.innerHTML=html;
}

function csvCell(v){ v=(v==null?'':String(v)); if(/[",\n\r]/.test(v)) v='"'+v.replace(/"/g,'""')+'"'; return v; }
function exportCSV(){
  loadHistory();
  const dates=slist(PROG_PREFIX).map(k=>k.slice(PROG_PREFIX.length)).sort();
  const rows=[['date','section','exercise','sets_done','sets_target']];
  const curNames={}, curSec={};
  exercises.forEach(e=>{ curNames[e.id]=e.name; curSec[e.id]=sectionName(e.sectionId); });
  dates.forEach(d=>{
    const counts=countsCache[d]||getJSON(PROG_PREFIX+d);
    const meta=metaCache[d]||getJSON(META_PREFIX+d);
    if(!counts) return;
    const entries=[];
    for(const id in counts){
      const raw=counts[id]||0; if(raw<=0) continue;
      let name,target,sec;
      if(meta&&meta.ex&&meta.ex[id]){ name=meta.ex[id].n; target=meta.ex[id].s; sec=meta.ex[id].sec||''; }
      else { name=curNames[id]||'Exercise'; target=''; sec=curSec[id]||''; }
      const done=target? Math.min(raw,target):raw;
      entries.push({sec,name,done,target});
    }
    if(!entries.length) return;
    const secOrder=(meta&&meta.secs)?meta.secs:[];
    entries.sort((a,b)=>{ const ai=secOrder.indexOf(a.sec),bi=secOrder.indexOf(b.sec); const aa=ai<0?999:ai,bb=bi<0?999:bi; if(aa!==bb) return aa-bb; return a.name.localeCompare(b.name); });
    entries.forEach(e=> rows.push([d,e.sec,e.name,e.done,e.target]));
  });
  const csv=rows.map(r=>r.map(csvCell).join(',')).join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='setlist_export_'+todayKey()+'.csv';
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },120);
}
function backupJSON(){
  const data={};
  for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.indexOf('wt_')===0) data[k]=localStorage.getItem(k); }
  const obj={app:'setlist',version:1,exportedAt:new Date().toISOString(),data:data};
  const blob=new Blob([JSON.stringify(obj)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='setlist_backup_'+todayKey()+'.json';
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },120);
}
function handleRestoreFile(input){
  const f=input.files&&input.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=function(){
    let obj;
    try{ obj=JSON.parse(r.result); }catch(e){ obj=null; }
    if(!obj || obj.app!=='setlist' || !obj.data){ alert("That file doesn't look like a Setlist backup."); input.value=''; return; }
    if(!confirm('Restore this backup? It will replace all current Setlist data on this device.')){ input.value=''; return; }
    const del=[];
    for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.indexOf('wt_')===0) del.push(k); }
    del.forEach(k=>localStorage.removeItem(k));
    Object.keys(obj.data).forEach(k=>{ if(k.indexOf('wt_')===0) localStorage.setItem(k, obj.data[k]); });
    alert('Backup restored.');
    location.reload();
  };
  r.readAsText(f);
}
function setView(v){
  view=v;
  document.getElementById('tabToday').classList.toggle('active',v==='today');
  document.getElementById('tabHistory').classList.toggle('active',v==='history');
  document.getElementById('todayView').classList.toggle('hidden',v!=='today');
  document.getElementById('historyView').classList.toggle('hidden',v!=='history');
  if(v==='today') renderToday(); else { selectedDate=DATE; renderHistory(); }
}
function escapeHtml(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function escapeAttr(s){return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

document.getElementById('resetBtn').onclick=resetDay;
document.getElementById('tabToday').onclick=()=>setView('today');
document.getElementById('tabHistory').onclick=()=>setView('history');
document.getElementById('prevM').onclick=()=>{ calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderHistory(); };
document.getElementById('nextM').onclick=()=>{ if(calYear===now.getFullYear()&&calMonth===now.getMonth()) return; calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderHistory(); };

document.getElementById('exportCsv').onclick=exportCSV;
document.getElementById('backupBtn').onclick=backupJSON;
document.getElementById('restoreBtn').onclick=()=>document.getElementById('restoreFile').click();
document.getElementById('restoreFile').onchange=function(){ handleRestoreFile(this); };
load(); renderToday();
</script>
