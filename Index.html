<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#17B26A" />
<title>Setlist — daily sets</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');

:root{
  --bg:#F4F6F5;--surface:#FFFFFF;--ink:#16211C;--muted:#7C8983;--line:#E4E8E6;
  --accent:#17B26A;--accent-deep:#0E8A50;--accent-wash:#E9F9F0;--danger:#E5484D;
  --pip-empty:#EDF0EE;--radius:18px;--shadow:0 1px 2px rgba(22,33,28,.04), 0 8px 24px rgba(22,33,28,.05);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.4;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
button:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:8px;}

.wrap{max-width:560px;margin:0 auto;padding:22px 18px 120px;}
.brand{display:flex;align-items:baseline;gap:8px;margin-bottom:2px;}
.brand h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;letter-spacing:.14em;text-transform:uppercase;margin:0;}
.brand .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);align-self:center;}
.subhead{color:var(--muted);font-size:13.5px;font-weight:500;}

.tabs{display:flex;background:#EAEEEC;border-radius:13px;padding:4px;gap:4px;margin:18px 0 20px;}
.tab{flex:1;text-align:center;padding:9px 0;border-radius:10px;font-weight:600;font-size:14px;color:var(--muted);transition:background .18s ease,color .18s ease;}
.tab.active{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(22,33,28,.08);}

.summary{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;margin:0 0 24px;box-shadow:var(--shadow);}
.summary-top{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;}
.count{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:34px;line-height:1;letter-spacing:-.01em;}
.count .of{color:var(--muted);font-size:19px;font-weight:600;}
.count-label{color:var(--muted);font-size:12.5px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;margin-top:6px;}
.pct{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;color:var(--accent-deep);}
.track{height:8px;border-radius:99px;background:var(--pip-empty);margin-top:16px;overflow:hidden;}
.track-fill{height:100%;width:0;background:var(--accent);border-radius:99px;transition:width .45s cubic-bezier(.22,1,.36,1);}
.done-banner{display:none;align-items:center;gap:10px;margin-top:14px;padding:11px 14px;background:var(--accent-wash);border-radius:12px;color:var(--accent-deep);font-weight:600;font-size:14px;}
.done-banner.show{display:flex;}

.list{display:flex;flex-direction:column;gap:12px;}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);transition:background .3s ease,border-color .3s ease;}
.card.complete{background:var(--accent-wash);border-color:#BFEBD3;}
.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.ex-name{font-weight:600;font-size:16.5px;display:flex;align-items:center;gap:8px;}
.ex-detail{color:var(--muted);font-size:13px;margin-top:2px;font-weight:500;}
.tick{width:18px;height:18px;border-radius:50%;background:var(--accent);display:none;align-items:center;justify-content:center;flex:0 0 auto;}
.card.complete .tick{display:inline-flex;}
.tick svg{width:11px;height:11px;stroke:#fff;stroke-width:2.5;fill:none;}
.setcount{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;color:var(--muted);white-space:nowrap;padding-top:2px;}
.setcount b{color:var(--ink);font-size:15px;}
.card.complete .setcount b{color:var(--accent-deep);}
.pips{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap;}
.pip{flex:1 1 0;min-width:22px;height:34px;border-radius:9px;background:var(--pip-empty);position:relative;transition:background .2s ease,transform .12s ease;}
.pip.filled{background:var(--accent);}
.pip:active{transform:scale(.94);}
.pip::after{content:"";position:absolute;inset:0;border-radius:9px;box-shadow:inset 0 0 0 1.5px rgba(22,33,28,.05);}
.pip.filled::after{box-shadow:none;}
@keyframes pop{0%{transform:scale(.8)}60%{transform:scale(1.06)}100%{transform:scale(1)}}
.pip.just-filled{animation:pop .28s cubic-bezier(.22,1,.36,1);}
.card-actions{display:flex;gap:14px;margin-top:14px;}
.link-btn{color:var(--muted);font-size:13px;font-weight:600;padding:2px 0;}
.link-btn:hover{color:var(--ink);}
.link-btn.danger:hover{color:var(--danger);}

.form{margin-top:14px;display:flex;flex-direction:column;gap:10px;}
.field label{display:block;font-size:11.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.field input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:11px;font-family:inherit;font-size:15px;color:var(--ink);background:#fff;}
.field input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(23,178,106,.12);}
.field-row{display:flex;gap:10px;}
.field-row .field{flex:1;}
.field-row .field.sets{flex:0 0 96px;}
.form-actions{display:flex;gap:10px;margin-top:2px;}
.btn{padding:11px 18px;border-radius:11px;font-weight:600;font-size:14.5px;transition:filter .15s ease,opacity .15s ease;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{filter:brightness(1.05);}
.btn-ghost{background:transparent;color:var(--muted);}
.btn-ghost:hover{color:var(--ink);}

.add-card{width:100%;margin-top:12px;padding:16px;border-radius:var(--radius);border:1.5px dashed #CBD3CF;background:transparent;color:var(--muted);font-weight:600;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;transition:border-color .2s ease,color .2s ease,background .2s ease;}
.add-card:hover{border-color:var(--accent);color:var(--accent-deep);background:var(--accent-wash);}
.add-card svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.2;fill:none;}
.footer{margin-top:26px;display:flex;justify-content:center;}
.reset-btn{color:var(--muted);font-size:13px;font-weight:600;}
.reset-btn:hover{color:var(--danger);}
.empty{text-align:center;color:var(--muted);padding:34px 20px;font-size:14.5px;}

.stats{display:flex;gap:10px;margin:0 0 18px;}
.stat{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 14px 13px;box-shadow:var(--shadow);}
.stat .v{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;line-height:1;}
.stat .l{color:var(--muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-top:6px;}
.cal{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 16px 18px;box-shadow:var(--shadow);}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-nav .m{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;}
.cal-nav button{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--muted);}
.cal-nav button:hover{background:var(--pip-empty);color:var(--ink);}
.cal-nav button:disabled{opacity:.3;cursor:default;}
.cal-nav svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.2;fill:none;}
.dow{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px;}
.dow span{text-align:center;font-size:11px;font-weight:600;color:var(--muted);}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cell{aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--ink);background:var(--pip-empty);transition:transform .1s ease;}
.cell.blank{background:transparent;pointer-events:none;}
.cell.today{box-shadow:inset 0 0 0 2px var(--accent);}
.cell.sel{box-shadow:inset 0 0 0 2px var(--ink);}
.cell:active{transform:scale(.93);}
.legend{display:flex;align-items:center;gap:6px;justify-content:flex-end;margin-top:12px;font-size:11px;color:var(--muted);font-weight:500;}
.legend i{width:13px;height:13px;border-radius:4px;display:inline-block;}
.day-detail{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);margin-top:14px;}
.day-detail h3{font-family:'Space Grotesk',sans-serif;font-size:15px;margin:0 0 2px;}
.day-detail .dd-sum{color:var(--muted);font-size:13px;font-weight:600;margin-bottom:12px;}
.dd-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-top:1px solid var(--line);}
.dd-row .n{font-size:14.5px;font-weight:500;flex:1;}
.dd-bar{width:74px;height:6px;border-radius:99px;background:var(--pip-empty);overflow:hidden;flex:0 0 auto;}
.dd-bar span{display:block;height:100%;background:var(--accent);border-radius:99px;}
.dd-row .c{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--muted);flex:0 0 auto;min-width:42px;text-align:right;}
.dd-empty{color:var(--muted);font-size:14px;padding:6px 0 2px;}
.hidden{display:none!important;}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><span class="dot"></span><h1>Setlist</h1></div>
    <div class="subhead" id="dateLine"></div>
  </header>

  <div class="tabs">
    <button class="tab active" id="tabToday">Today</button>
    <button class="tab" id="tabHistory">History</button>
  </div>

  <div id="todayView">
    <section class="summary">
      <div class="summary-top">
        <div>
          <div class="count"><span id="doneCount">0</span><span class="of">/<span id="totalCount">0</span></span></div>
          <div class="count-label">sets logged today</div>
        </div>
        <div class="pct" id="pctText">0%</div>
      </div>
      <div class="track"><div class="track-fill" id="trackFill"></div></div>
      <div class="done-banner" id="doneBanner"><span>✓</span><span>Session complete — nice work.</span></div>
    </section>
    <div class="list" id="list"></div>
    <button class="add-card" id="addBtn">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      Add exercise
    </button>
    <div class="footer"><button class="reset-btn" id="resetBtn">Reset today's progress</button></div>
  </div>

  <div id="historyView" class="hidden">
    <div class="stats">
      <div class="stat"><div class="v" id="stStreak">0</div><div class="l">Day streak</div></div>
      <div class="stat"><div class="v" id="stDays">0</div><div class="l">Days trained</div></div>
      <div class="stat"><div class="v" id="stMonth">0</div><div class="l" id="stMonthLbl">Sets this month</div></div>
    </div>
    <div class="cal">
      <div class="cal-nav">
        <button id="prevM" aria-label="Previous month"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
        <div class="m" id="calMonthLbl">—</div>
        <button id="nextM" aria-label="Next month"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
      <div class="dow"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div>
      <div class="grid" id="calGrid"></div>
      <div class="legend">Less<i style="background:var(--pip-empty)"></i><i style="background:rgba(23,178,106,.35)"></i><i style="background:rgba(23,178,106,.65)"></i><i style="background:var(--accent)"></i>More</div>
    </div>
    <div class="day-detail" id="dayDetail"></div>
  </div>
</div>

<script>
/* ---------- storage: browser localStorage (reliable, persists on this device) ---------- */
function sget(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function sset(k,v){ try{ localStorage.setItem(k,v); }catch(e){ console.error('save failed',e); } }
function slist(prefix){ const out=[]; try{ for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.indexOf(prefix)===0) out.push(k); } }catch(e){} return out; }
function getJSON(k){ const v=sget(k); if(!v) return null; try{ return JSON.parse(v); }catch(e){ return null; } }

function keyOf(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function todayKey(){ return keyOf(new Date()); }
function prettyToday(){ return new Date().toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'}); }
function prettyFromKey(k){ const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d).toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'}); }
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

const EX_KEY='wt_exercises';
const DATE=todayKey();
const PROG_PREFIX='wt_progress_';
const META_PREFIX='wt_daymeta_';
const PROG_KEY=PROG_PREFIX+DATE;
let exercises=[];
let progress={};
let editingId=null;
let view='today';

const now=new Date();
let calYear=now.getFullYear();
let calMonth=now.getMonth();
let selectedDate=DATE;
const countsCache={};
const metaCache={};

const DEFAULTS=[
  {name:'Push-ups', detail:'Bodyweight', sets:3},
  {name:'Goblet squats', detail:'15 reps', sets:4},
  {name:'Plank', detail:'45 seconds', sets:3},
];
function uid(){ return 'x'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function load(){
  const rawEx=getJSON(EX_KEY);
  if(rawEx){ exercises=rawEx; }
  else{ exercises=DEFAULTS.map(d=>({id:uid(),...d})); sset(EX_KEY,JSON.stringify(exercises)); }
  const rawProg=getJSON(PROG_KEY);
  if(rawProg){ progress=rawProg; }
  updateDayMeta();
}
function saveExercises(){ sset(EX_KEY,JSON.stringify(exercises)); updateDayMeta(); }
function saveProgress(){ sset(PROG_KEY,JSON.stringify(progress)); countsCache[DATE]=progress; updateDayMeta(); }
function updateDayMeta(){
  const ex={}; let tot=0;
  exercises.forEach(e=>{ ex[e.id]={n:e.name,s:e.sets}; tot+=e.sets; });
  const meta={tot,ex}; metaCache[DATE]=meta; sset(META_PREFIX+DATE,JSON.stringify(meta));
}

const list=document.getElementById('list');
function renderToday(){
  document.getElementById('dateLine').textContent=prettyToday();
  list.innerHTML='';
  if(exercises.length===0 && editingId!=='new'){
    const e=document.createElement('div'); e.className='empty';
    e.textContent='No exercises yet. Add your first one below.'; list.appendChild(e);
  }
  exercises.forEach(ex=>{
    if(editingId===ex.id){ list.appendChild(editForm(ex)); return; }
    const done=Math.min(progress[ex.id]||0, ex.sets);
    const complete=done>=ex.sets && ex.sets>0;
    const card=document.createElement('div'); card.className='card'+(complete?' complete':'');
    const head=document.createElement('div'); head.className='card-head';
    head.innerHTML='<div><div class="ex-name">'+escapeHtml(ex.name)+
      '<span class="tick"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></span></div>'+
      (ex.detail?'<div class="ex-detail">'+escapeHtml(ex.detail)+'</div>':'')+
      '</div><div class="setcount"><b>'+done+'</b> / '+ex.sets+'</div>';
    card.appendChild(head);
    const pips=document.createElement('div'); pips.className='pips';
    for(let i=0;i<ex.sets;i++){
      const pip=document.createElement('button');
      pip.className='pip'+(i<done?' filled':'');
      pip.setAttribute('aria-label','Set '+(i+1)+(i<done?' done, tap to undo':', tap to log'));
      pip.onclick=()=>togglePip(ex,i);
      pips.appendChild(pip);
    }
    card.appendChild(pips);
    const actions=document.createElement('div'); actions.className='card-actions';
    const edit=document.createElement('button'); edit.className='link-btn'; edit.textContent='Edit';
    edit.onclick=()=>{editingId=ex.id;renderToday();};
    actions.appendChild(edit); card.appendChild(actions);
    list.appendChild(card);
  });
  if(editingId==='new') list.appendChild(editForm(null));
  updateSummary();
}

function editForm(ex){
  const isNew=!ex;
  const wrap=document.createElement('div'); wrap.className='card';
  wrap.innerHTML='<div class="form">'+
    '<div class="field"><label>Exercise</label>'+
      '<input id="f-name" type="text" placeholder="e.g. Bench press" value="'+(ex?escapeAttr(ex.name):'')+'"></div>'+
    '<div class="field-row">'+
      '<div class="field"><label>Detail (optional)</label>'+
        '<input id="f-detail" type="text" placeholder="reps, weight, time" value="'+(ex?escapeAttr(ex.detail||''):'')+'"></div>'+
      '<div class="field sets"><label>Sets</label>'+
        '<input id="f-sets" type="number" min="1" max="20" inputmode="numeric" value="'+(ex?ex.sets:3)+'"></div>'+
    '</div>'+
    '<div class="form-actions">'+
      '<button class="btn btn-primary" id="f-save">'+(isNew?'Add exercise':'Save')+'</button>'+
      '<button class="btn btn-ghost" id="f-cancel">Cancel</button>'+
      (isNew?'':'<button class="link-btn danger" id="f-delete" style="margin-left:auto">Delete</button>')+
    '</div></div>';
  setTimeout(()=>{
    const nameEl=wrap.querySelector('#f-name'); if(nameEl) nameEl.focus();
    wrap.querySelector('#f-save').onclick=()=>commitForm(ex);
    wrap.querySelector('#f-cancel').onclick=()=>{editingId=null;renderToday();};
    const del=wrap.querySelector('#f-delete'); if(del) del.onclick=()=>deleteExercise(ex.id);
  },0);
  return wrap;
}

function commitForm(ex){
  const name=document.getElementById('f-name').value.trim();
  const detail=document.getElementById('f-detail').value.trim();
  let sets=parseInt(document.getElementById('f-sets').value,10);
  if(!name){ document.getElementById('f-name').focus(); return; }
  if(!sets||sets<1) sets=1; if(sets>20) sets=20;
  if(ex){
    ex.name=name; ex.detail=detail; ex.sets=sets;
    if((progress[ex.id]||0)>sets){ progress[ex.id]=sets; saveProgress(); }
  }else{ exercises.push({id:uid(),name,detail,sets}); }
  editingId=null; saveExercises(); renderToday();
}
function deleteExercise(id){
  exercises=exercises.filter(e=>e.id!==id); delete progress[id]; editingId=null;
  saveExercises(); saveProgress(); renderToday();
}
function togglePip(ex,i){
  const cur=progress[ex.id]||0;
  const next=(i+1===cur)? i : i+1;
  progress[ex.id]=next; saveProgress(); renderToday();
  if(next>cur){
    const cards=list.querySelectorAll('.card');
    const idx=exercises.findIndex(e=>e.id===ex.id);
    const card=cards[idx];
    if(card){ const pip=card.querySelectorAll('.pip')[next-1]; if(pip) pip.classList.add('just-filled'); }
  }
}
function updateSummary(){
  let total=0, done=0;
  exercises.forEach(ex=>{ total+=ex.sets; done+=Math.min(progress[ex.id]||0,ex.sets); });
  document.getElementById('doneCount').textContent=done;
  document.getElementById('totalCount').textContent=total;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('pctText').textContent=pct+'%';
  document.getElementById('trackFill').style.width=pct+'%';
  document.getElementById('doneBanner').classList.toggle('show', total>0 && done>=total);
}
function resetDay(){ progress={}; saveProgress(); renderToday(); }

/* ---------- history ---------- */
function sumCounts(c){ if(!c) return 0; let s=0; for(const k in c) s+=c[k]||0; return s; }
function dayDone(counts, meta){
  if(!counts) return 0; let done=0;
  for(const id in counts){ const cap=(meta&&meta.ex&&meta.ex[id])? meta.ex[id].s : Infinity; done+=Math.min(counts[id]||0, cap); }
  return done;
}
function dayFraction(counts, meta){
  const done=dayDone(counts,meta);
  if(done<=0) return 0;
  if(meta&&meta.tot>0) return Math.max(0,Math.min(1,done/meta.tot));
  return 0.5;
}
function loadHistory(){
  const dates=slist(PROG_PREFIX).map(k=>k.slice(PROG_PREFIX.length));
  for(const d of dates){
    if(!(d in countsCache)) countsCache[d]=getJSON(PROG_PREFIX+d);
    if(!(d in metaCache))   metaCache[d]=getJSON(META_PREFIX+d);
  }
  return dates;
}
function computeStats(){
  const dates=Object.keys(countsCache);
  const active={};
  dates.forEach(d=>{ if(sumCounts(countsCache[d])>0) active[d]=true; });
  const daysTrained=Object.keys(active).length;
  let streak=0, cursor=new Date();
  if(!active[keyOf(cursor)]) cursor.setDate(cursor.getDate()-1);
  while(active[keyOf(cursor)]){ streak++; cursor.setDate(cursor.getDate()-1); }
  let monthSets=0;
  const pfx=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-';
  dates.forEach(d=>{ if(d.indexOf(pfx)===0) monthSets+=sumCounts(countsCache[d]); });
  return {daysTrained,streak,monthSets};
}
function renderHistory(){
  loadHistory();
  const st=computeStats();
  document.getElementById('stStreak').textContent=st.streak;
  document.getElementById('stDays').textContent=st.daysTrained;
  document.getElementById('stMonth').textContent=st.monthSets;
  document.getElementById('stMonthLbl').textContent='Sets in '+MONTHS[calMonth].slice(0,3);
  document.getElementById('calMonthLbl').textContent=MONTHS[calMonth]+' '+calYear;
  document.getElementById('nextM').disabled=(calYear===now.getFullYear() && calMonth===now.getMonth());

  const grid=document.getElementById('calGrid'); grid.innerHTML='';
  const first=new Date(calYear,calMonth,1);
  const startPad=first.getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  for(let i=0;i<startPad;i++){ const b=document.createElement('div'); b.className='cell blank'; grid.appendChild(b); }
  for(let day=1;day<=daysInMonth;day++){
    const dk=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    const counts=countsCache[dk], meta=metaCache[dk];
    const cell=document.createElement('button'); cell.className='cell';
    if(dk===DATE) cell.classList.add('today');
    if(dk===selectedDate) cell.classList.add('sel');
    cell.textContent=day;
    if(sumCounts(counts)>0){
      const frac=dayFraction(counts,meta), alpha=0.28+0.72*frac;
      cell.style.background='rgba(23,178,106,'+alpha.toFixed(2)+')';
      if(alpha>0.6) cell.style.color='#fff';
    }
    cell.onclick=()=>{ selectedDate=dk; renderHistory(); };
    grid.appendChild(cell);
  }
  renderDayDetail();
}
function renderDayDetail(){
  const box=document.getElementById('dayDetail');
  const dk=selectedDate, counts=countsCache[dk], meta=metaCache[dk];
  const done=dayDone(counts,meta);
  let html='<h3>'+prettyFromKey(dk)+(dk===DATE?' · today':'')+'</h3>';
  if(!counts || sumCounts(counts)===0){ box.innerHTML=html+'<div class="dd-empty">No sets logged this day.</div>'; return; }
  if(meta && meta.tot>0){ html+='<div class="dd-sum">'+done+' / '+meta.tot+' sets · '+Math.round(done/meta.tot*100)+'%</div>'; }
  else{ html+='<div class="dd-sum">'+sumCounts(counts)+' sets logged</div>'; }
  const curNames={}; exercises.forEach(e=>curNames[e.id]=e.name);
  const rows=[], seen={};
  if(meta&&meta.ex){ for(const id in meta.ex){ const t=meta.ex[id].s, d=Math.min(counts[id]||0,t); rows.push({name:meta.ex[id].n,done:d,target:t}); seen[id]=true; } }
  for(const id in counts){ if(seen[id]) continue; rows.push({name:curNames[id]||'Exercise',done:counts[id],target:null}); }
  rows.forEach(r=>{
    const frac=r.target? Math.min(1,r.done/r.target):(r.done>0?1:0);
    const label=r.target? (r.done+' / '+r.target):(r.done+' sets');
    html+='<div class="dd-row"><span class="n">'+escapeHtml(r.name)+'</span>'+
          '<span class="dd-bar"><span style="width:'+Math.round(frac*100)+'%"></span></span>'+
          '<span class="c">'+label+'</span></div>';
  });
  box.innerHTML=html;
}

function setView(v){
  view=v;
  document.getElementById('tabToday').classList.toggle('active',v==='today');
  document.getElementById('tabHistory').classList.toggle('active',v==='history');
  document.getElementById('todayView').classList.toggle('hidden',v!=='today');
  document.getElementById('historyView').classList.toggle('hidden',v!=='history');
  if(v==='today') renderToday(); else { selectedDate=DATE; renderHistory(); }
}
function escapeHtml(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function escapeAttr(s){return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

document.getElementById('addBtn').onclick=()=>{editingId='new';renderToday();};
document.getElementById('resetBtn').onclick=resetDay;
document.getElementById('tabToday').onclick=()=>setView('today');
document.getElementById('tabHistory').onclick=()=>setView('history');
document.getElementById('prevM').onclick=()=>{ calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderHistory(); };
document.getElementById('nextM').onclick=()=>{ if(calYear===now.getFullYear()&&calMonth===now.getMonth()) return; calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderHistory(); };

load(); renderToday();
</script>
